name: Plan Dev Environment

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/**'
      - 'scripts/**'

jobs:
  plan-dev:
    runs-on: [self-hosted, linux, homelab]
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify runner environment
        run: |
          echo "Runner: $(hostname)"
          echo "User: $(whoami)"
          echo "Working directory: $(pwd)"

      - name: Setup SSH agent
        run: |
          eval $(ssh-agent -s)
          ssh-add /home/github-runner/.ssh/id_ed25519
          ssh-add -L

      - name: Setup Devbox
        uses: jetify-com/devbox-install-action@v0.11.0
        with:
          project-path: .

      - name: Configure Terraform for Dev
        run: |
          cd terraform
          cp terraform.tfvars.dev.example terraform.tfvars

      - name: Terraform Plan (Dev)
        run: |
          devbox run init
          devbox run plan
        env:
          TF_VAR_proxmox_endpoint: "https://192.168.1.5:8006/"
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_proxmox_ssh_username: "root"
          TF_VAR_talos_cluster_name: "talos-dev"
          TF_VAR_cluster_vip: "192.168.1.181"

      - name: Upload Plan Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev-${{ github.event.number }}
          path: |
            terraform/plan.pln
            terraform/.terraform.lock.hcl
          retention-days: 30

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let planOutput = 'Terraform plan completed successfully. Check Actions logs for details.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🏗️ Terraform Plan (Dev Environment)\n\n${planOutput}\n\n**Environment:** Development\n**Cluster:** talos-dev\n**VIP:** 192.168.1.181`
            });